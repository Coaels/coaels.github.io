<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Agent</title>
    <style>
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: -apple-system, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 640px;
            width: 100%;
            background: #161b22;
            padding: 40px 36px;
            border-radius: 16px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }
        h1 span {
            color: #58a6ff;
        }
        .sub {
            color: #8b949e;
            font-size: 16px;
            margin: 0 0 24px 0;
            border-left: 3px solid #30363d;
            padding-left: 16px;
        }
        .desc {
            font-size: 15px;
            line-height: 1.7;
            color: #c9d1d9;
            margin-bottom: 28px;
        }
        .desc code {
            background: #21262d;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #f0883e;
        }
        .btn {
            display: inline-block;
            background: #238636;
            color: #fff;
            padding: 12px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: background 0.2s;
            border: 1px solid #2ea043;
        }
        .btn:hover {
            background: #2ea043;
        }
        .footer {
            margin-top: 28px;
            font-size: 13px;
            color: #484f58;
            border-top: 1px solid #21262d;
            padding-top: 20px;
        }
        .footer a {
            color: #58a6ff;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Deepseek <span>Agent</span></h1>
        <div class="sub">模拟 OpenClaw,60% 模拟度,拥有简易Skill 系统</div>
        <div class="desc">
            基于 Python 的轻量级 Agent 框架，支持自定义 Skill 和本地工具调用。<br>
            当前版本：<code>Alpha 0.0.1</code>
        </div>
        <a href="https://github.com/Coaels/Deepseek_Agent" class="btn" target="_blank">
            查看项目
        </a>
        <div class="footer">
            <a href="https://github.com/Coaels/Deepseek_Agent">GitHub 仓库</a> · 
            由 <a href="#">Coaels</a> 维护
        </div>
    </div>
</body>
</html>
